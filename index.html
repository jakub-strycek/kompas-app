${e.evidence.map(p=>`<div class="card"><div style="font-weight:600;margin-bottom:3px">${n(p.claim)}</div><div style="font-size:9px;color:#8888a0">${n(p.source)} · <span class="badge" style="background:#f5f3ff;color:#7c3aed">${p.lever}</span></div>${p.implication?`<div class="hl" style="background:#f8f7f4;border-left:3px solid #4f46e5;padding:4px 8px">${n(p.implication)}</div>`:""}</div>`).join("")}`:""}
